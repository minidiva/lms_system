basePath: /api/v1
definitions:
  chapter.CreateChapterRequest:
    properties:
      course_id:
        type: integer
      description:
        type: string
      name:
        type: string
      order_position:
        type: integer
    required:
    - course_id
    - name
    type: object
  chapter.UpdateChapterRequest:
    properties:
      course_id:
        type: string
      description:
        type: string
      name:
        type: string
      order_position:
        type: integer
    required:
    - course_id
    - name
    type: object
  dto.AuthLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  dto.AuthLoginResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  dto.AuthRefreshRequest:
    properties:
      refresh_token:
        type: string
    type: object
  dto.AuthRefreshResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  dto.BuyCourseRequest:
    properties:
      course_id:
        type: integer
      userUUID:
        description: ← UUID напрямую из Keycloak, не приходит из JSON
        type: string
    type: object
  dto.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  dto.ChangePasswordResponse:
    properties:
      message:
        type: string
    type: object
  dto.CreateCourseRequest:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  dto.CreateLessonRequest:
    properties:
      chapter_id:
        type: integer
      content:
        type: string
      description:
        type: string
      name:
        type: string
      order_position:
        type: integer
    required:
    - chapter_id
    - name
    type: object
  dto.UpdateLessonRequest:
    properties:
      content:
        type: string
      description:
        type: string
      name:
        type: string
      order_position:
        type: integer
    required:
    - name
    type: object
  dto.UpdateProfileRequest:
    properties:
      email:
        type: string
      first_name:
        minLength: 2
        type: string
      last_name:
        minLength: 2
        type: string
    type: object
  dto.UpdateProfileResponse:
    properties:
      message:
        type: string
    type: object
  dto.UserRegistrationRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 6
        type: string
      roles:
        items:
          type: string
        type: array
      username:
        type: string
    required:
    - email
    - password
    - roles
    - username
    type: object
  dto.UserRegistrationResponse:
    properties:
      email:
        type: string
      user_id:
        type: string
      username:
        type: string
    type: object
  entity.Attachment:
    properties:
      created_at:
        type: string
      id:
        type: integer
      lesson_id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  entity.Chapter:
    properties:
      courseID:
        type: integer
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      orderPosition:
        type: integer
      updatedAt:
        type: string
    type: object
  entity.ChapterInfoAggregate:
    properties:
      courseID:
        type: integer
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      lessonsName:
        items:
          type: string
        type: array
      name:
        type: string
      orderPosition:
        type: integer
      updatedAt:
        type: string
    type: object
  entity.Course:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
  entity.CourseAggregate:
    properties:
      chapters:
        items:
          $ref: '#/definitions/entity.Chapter'
        type: array
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
  entity.Lesson:
    properties:
      attachments:
        description: Relations
        items:
          $ref: '#/definitions/entity.Attachment'
        type: array
      chapterID:
        type: integer
      content:
        type: string
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      orderPosition:
        type: integer
      updatedAt:
        type: string
    type: object
host: localhost:8082
info:
  contact: {}
  description: API для системы управления обучением
  title: LMS System API
  version: "1.0"
paths:
  /admin/chapter/delete/{id}:
    delete:
      description: Deletes chapter by ID
      parameters:
      - description: Chapter ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete chapter
      tags:
      - admin
  /admin/register:
    post:
      consumes:
      - application/json
      description: Accepts Username, Email, Password, FirstName, LastName, Roles and
        returns user_id, username, email
      parameters:
      - description: User credentials
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.UserRegistrationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserRegistrationResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: User Register
      tags:
      - admin
  /auth/login:
    post:
      consumes:
      - application/json
      description: Accepts username and password, returns AccessToken and RefreshToken
      parameters:
      - description: Login credentials
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthLoginResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Accepts RefreshKey, returns new AccessToken and RefreshToken
      parameters:
      - description: Refresh key
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.AuthRefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AuthRefreshResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User refresh
      tags:
      - auth
  /chapters/create:
    post:
      consumes:
      - application/json
      description: Creates a new chapter with course_id in request body
      parameters:
      - description: Chapter data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/chapter.CreateChapterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create chapter standalone
      tags:
      - teacher
  /chapters/update/{id}:
    put:
      consumes:
      - application/json
      description: Updates chapter by ID
      parameters:
      - description: Chapter ID
        in: path
        name: id
        required: true
        type: integer
      - description: Chapter data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/chapter.UpdateChapterRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update chapter
      tags:
      - teacher
  /courses/create:
    post:
      consumes:
      - application/json
      description: Creates a new course
      parameters:
      - description: Course data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCourseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create course
      tags:
      - admin
  /courses/delete/{id}:
    delete:
      description: Deletes course by ID
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete course
      tags:
      - admin
  /courses/update/{id}:
    put:
      consumes:
      - application/json
      description: Updates course by ID
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      - description: Course data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCourseRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update course
      tags:
      - teacher
  /lessons:
    post:
      consumes:
      - application/json
      description: Creates a new lesson with chapter_id in request body
      parameters:
      - description: Lesson data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.CreateLessonRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create lesson standalone
      tags:
      - teacher
  /lessons/{id}:
    delete:
      description: Deletes lesson by ID
      parameters:
      - description: Lesson ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete lesson
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Updates lesson by ID
      parameters:
      - description: Lesson ID
        in: path
        name: id
        required: true
        type: integer
      - description: Lesson data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateLessonRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update lesson
      tags:
      - teacher
  /public/courses:
    get:
      description: Returns list of all courses
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.Course'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all courses
      tags:
      - courses
  /public/courses/{id}:
    get:
      description: Returns course with chapters by ID
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.CourseAggregate'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get course by ID
      tags:
      - courses
  /public/courses/{id}/chapters:
    get:
      description: Returns list of chapters with lesson names for the specified course
      parameters:
      - description: Course ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/entity.ChapterInfoAggregate'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get chapters by course ID
      tags:
      - courses
  /user/change-password:
    post:
      consumes:
      - application/json
      description: Accepts AccessKey, returns AccessToken and RefreshToken
      parameters:
      - description: Current&New Password  credentials
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ChangePasswordResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: User ChangePassword
      tags:
      - user
  /user/courses/buy:
    post:
      consumes:
      - application/json
      description: Purchase a course for the authenticated user
      parameters:
      - description: Course ID to buy
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.BuyCourseRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Buy course
      tags:
      - user
  /user/lessons/{id}:
    get:
      description: Returns lesson by ID
      parameters:
      - description: Lesson ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/entity.Lesson'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get lesson by ID
      tags:
      - user
  /user/profile:
    put:
      consumes:
      - application/json
      description: Accepts FirstName, LastName, Email and updates user profile in
        Keycloak
      parameters:
      - description: Profile data
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UpdateProfileResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - user
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
